name: Release to PyPI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Optional explicit version (overrides bump, e.g. 1.2.3)
        required: false
        type: string
      prerelease:
        description: Mark GitHub release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/doppler-colab

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install hatch ruff uv

      - name: Bump/set version with uv
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            uv version "${INPUT_VERSION}"
          else
            uv version --bump "${INPUT_BUMP}"
          fi

          NEW_VERSION="$(uv version --short)"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          if git diff --quiet -- pyproject.toml; then
            echo "No version change detected"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.ver.outputs.version }}"
          git push origin HEAD:main

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: pytest tests/ -v

      - name: Build
        run: hatch build

      - name: Ensure tag does not exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.ver.outputs.tag }}$"; then
            echo "Tag ${{ steps.ver.outputs.tag }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            $([ "${{ inputs.prerelease }}" = "true" ] && echo "--prerelease")

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
